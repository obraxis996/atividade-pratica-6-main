<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Rede Social</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

    <main class="container">
        <article class="cadastro-box">
            <h1>Criar Conta</h1>

            <form action="feed.html">

                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required minlength="3">

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="Escolha um nome de usuário" required minlength="3">

                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required minlength="6">

                <label for="confirmar-senha">Confirmação de senha</label>
                <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Confirme sua senha" required minlength="6">

                <label for="genero">Gênero</label>
                <select id="genero" name="genero" required>
                    <option value="" selected disabled>Selecione uma opção</option>
                    <option value="masculino">Masculino</option>
                    <option value="feminino">Feminino</option>
                    <option value="nao-binario">Não binário</option>
                    <option value="outro">Outro</option>
                    <option value="prefiro-nao-informar">Prefiro não informar</option>
                </select>

                <label for="data-nascimento">Data de Nascimento</label>
                <input type="date" id="data-nascimento" name="data-nascimento" required>

                <button type="submit">Cadastrar</button>

            </form>

            <p>
                <a href="index.html" role="button" class="outline">Já possuo uma conta</a>
            </p>
        </article>
    </main>

</body>
</html>
